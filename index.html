<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 15px; overflow: hidden; }
        .terminal { border: 1px solid var(--neon); height: 95vh; display: flex; flex-direction: column; box-shadow: inset 0 0 20px #00ff4133; }
        .header { background: var(--neon); color: #000; padding: 5px; font-weight: bold; text-align: center; letter-spacing: 3px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--neon); }
        .stat-box { padding: 10px; border: 1px solid #111; font-size: 12px; }
        #log { flex-grow: 1; overflow-y: auto; padding: 10px; font-size: 11px; line-height: 1.4; color: #008f11; }
        .input-area { padding: 15px; border-top: 1px solid var(--neon); background: #000; }
        input { background: transparent; border: 1px solid var(--neon); color: var(--neon); width: 100%; padding: 10px; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        button { background: transparent; border: 1px solid var(--neon); color: var(--neon); width: 100%; padding: 12px; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.3s; }
        button:hover { background: var(--neon); color: #000; }
        .scanline { width: 100%; height: 100px; z-index: 10; background: linear-gradient(0deg, rgba(0,255,65,0) 0%, rgba(0,255,65,0.1) 50%, rgba(0,255,65,0) 100%); opacity: 0.1; position: absolute; bottom: 100%; pointer-events: none; animation: scan 4s linear infinite; }
        @keyframes scan { to { bottom: -100px; } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="terminal">
        <div class="header">NEON_ZERO // OVERLOAD ENGINE</div>
        <div class="stats-grid">
            <div class="stat-box">NODE: MARATIK_DECK</div>
            <div class="stat-box">ENCRYPTION: AES-256</div>
            <div class="stat-box" id="cpu-load">CPU: 2%</div>
            <div class="stat-box" id="ram-use">NET: STABLE</div>
        </div>
        <canvas id="attackChart" style="width:100%; height:120px;"></canvas>
        <div id="log">--- ОЖИДАНИЕ ИНИЦИАЛИЗАЦИИ ---<br></div>
        <div class="input-area">
            <input type="text" id="target" placeholder="TARGET_URL: http://site.com">
            <button onclick="startAttack()">ИНИЦИИРОВАТЬ ПОТОК</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const log = document.getElementById('log');
        const ctx = document.getElementById('attackChart').getContext('2d');

        let chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'RPS', data: [], borderColor: '#00ff41', borderWidth: 1, fill: true, backgroundColor: 'rgba(0, 255, 65, 0.05)' }] },
            options: { animation: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
        });

        function writeLog(text) {
            log.innerHTML += `> ${text}<br>`;
            log.scrollTop = log.scrollHeight;
        }

        function startAttack() {
            const url = document.getElementById('target').value;
            if(!url) return;

            writeLog("Инициализация протокола OVERLOAD...");
            writeLog("Обход брандмауэра...");
            writeLog("Синхронизация с ботнетом...");

            let i = 0;
            const timer = setInterval(() => {
                i++;
                const val = Math.floor(Math.random() * 500) + 200;
                chart.data.labels.push(i);
                chart.data.datasets[0].data.push(val);
                if(chart.data.labels.length > 20) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
                chart.update();
                
                document.getElementById('cpu-load').innerText = `CPU: ${Math.min(99, 10 + i*2)}%`;
                writeLog(`PACKET_SENT -> ${url} | [OK]`);

                if(i > 15) {
                    clearInterval(timer);
                    writeLog("ПЕРЕДАЧА ДАННЫХ В СЕРВЕРНЫЙ МОДУЛЬ...");
                    setTimeout(() => {
                        tg.sendData(url);
                        tg.close();
                    }, 1000);
                }
            }, 200);
        }
    </script>
</body>
</html>
